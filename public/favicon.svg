<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c4ff"/>
      <stop offset="60%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
    <linearGradient id="dg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
    <filter id="gl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo oscuro redondeado (útil en contextos claros) -->
  <rect width="100" height="100" rx="18" fill="#080d1a"/>

  <!-- Cuerpo del ratón -->
  <path d="M50 8 C18 8, 4 28, 4 55 C4 76, 18 92, 42 95 C57 98, 78 91, 88 76 C98 61, 95 36, 82 22"
    fill="none" stroke="url(#rg)" stroke-width="3.8" stroke-linecap="round" filter="url(#gl)"/>

  <!-- Cabeza -->
  <ellipse cx="82" cy="18" rx="14" ry="11" fill="#080d1a" stroke="url(#rg)" stroke-width="3.4"/>

  <!-- Oreja -->
  <ellipse cx="74" cy="9" rx="6" ry="7" fill="#080d1a" stroke="url(#rg)" stroke-width="3"/>
  <ellipse cx="74" cy="9" rx="3" ry="4" fill="rgba(0,230,118,0.18)"/>

  <!-- Ojo -->
  <circle cx="87" cy="15" r="2.8" fill="#40c4ff" filter="url(#gl)"/>
  <circle cx="87" cy="15" r="1.1" fill="white"/>

  <!-- Nariz -->
  <circle cx="95" cy="21" r="2" fill="#00e676" filter="url(#gl)"/>

  <!-- Bigotes -->
  <line x1="96" y1="19.5" x2="100" y2="16" stroke="#40c4ff" stroke-width="0.9" opacity="0.7" stroke-linecap="round"/>
  <line x1="96" y1="21"   x2="100" y2="21" stroke="#40c4ff" stroke-width="0.9" opacity="0.7" stroke-linecap="round"/>
  <line x1="96" y1="22.5" x2="100" y2="26" stroke="#40c4ff" stroke-width="0.9" opacity="0.7" stroke-linecap="round"/>

  <!-- Cola -->
  <path d="M42 95 C30 100, 13 96, 6 88"
    fill="none" stroke="url(#rg)" stroke-width="3" stroke-linecap="round" filter="url(#gl)"/>

  <!-- Hebras ADN -->
  <path d="M34 28 Q43 39, 34 50 Q25 61, 34 72"
    fill="none" stroke="url(#dg)" stroke-width="2.4" stroke-linecap="round" filter="url(#gl)"/>
  <path d="M56 28 Q47 39, 56 50 Q65 61, 56 72"
    fill="none" stroke="url(#dg)" stroke-width="2.4" stroke-linecap="round" filter="url(#gl)"/>

  <!-- Peldaños ADN -->
  <line x1="34.5" y1="33"   x2="55.5" y2="33"   stroke="#00e676" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>
  <line x1="27"   y1="43.5" x2="63"   y2="43.5" stroke="#00e676" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>
  <line x1="27"   y1="56.5" x2="63"   y2="56.5" stroke="#a8e063" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>
  <line x1="34.5" y1="67"   x2="55.5" y2="67"   stroke="#a8e063" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>

  <!-- Puntos en uniones -->
  <circle cx="34.5" cy="33"   r="1.8" fill="#00e676"/>
  <circle cx="55.5" cy="33"   r="1.8" fill="#00e676"/>
  <circle cx="27"   cy="43.5" r="1.8" fill="#40c4ff"/>
  <circle cx="63"   cy="43.5" r="1.8" fill="#40c4ff"/>
  <circle cx="27"   cy="56.5" r="1.8" fill="#40c4ff"/>
  <circle cx="63"   cy="56.5" r="1.8" fill="#40c4ff"/>
  <circle cx="34.5" cy="67"   r="1.8" fill="#a8e063"/>
  <circle cx="55.5" cy="67"   r="1.8" fill="#a8e063"/>
</svg>
