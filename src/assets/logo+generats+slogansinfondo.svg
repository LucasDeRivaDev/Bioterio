<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" fill="none">
  <defs>
    <linearGradient id="rat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c4ff" />
      <stop offset="60%" stop-color="#00e676" />
      <stop offset="100%" stop-color="#a8e063" />
    </linearGradient>
    <linearGradient id="dna" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e676" />
      <stop offset="100%" stop-color="#a8e063" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .brand {
        font-family: Inter, Arial, sans-serif;
        font-size: 108px;
        font-weight: 800;
        letter-spacing: -3px;
      }
      .tagline {
        font-family: Inter, Arial, sans-serif;
        font-size: 46px;
        font-style: italic;
        font-weight: 700;
      }
      .subline {
        font-family: Inter, Arial, sans-serif;
        font-size: 26px;
        font-weight: 500;
      }
    </style>
  </defs>

  <g transform="translate(10 8) scale(2.05)">
