    <line x1="96" y1="21" x2="100" y2="21" stroke="#40c4ff" stroke-width="0.9" opacity="0.7" stroke-linecap="round" />
    <line x1="96" y1="22.5" x2="100" y2="26" stroke="#40c4ff" stroke-width="0.9" opacity="0.7" stroke-linecap="round" />
